# Use Ctrl-a as the prefix instead of Ctrl-b
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Start windows and panes at 1, not 0 (easier to reach)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 20000

# Faster command sequences (no delay for escape)
set -s escape-time 0

# Increase display time for messages
set -g display-time 2000

# Refresh status more often
set -g status-interval 5

# Focus events for vim/neovim
set -g focus-events on

# Enable mouse: click panes/windows, drag borders to resize, scroll with wheel
set -g mouse on

# Enables shift+enter
set -s extended-keys always

# Split panes with | and -, inheriting the current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# status bar theme
set -g status-bg 'colour235'
set -g status-justify 'centre'
set -g status-left-length '100'
set -g status 'on'
set -g status-right-length '100'
set -g status-left '#[fg=colour232,bg=colour208] #S #[fg=colour154,bg=colour238,nobold,nounderscore,noitalics]#[fg=colour222,bg=colour238] #W #[fg=colour238,bg=colour235,nobold,nounderscore,noitalics]'
set -g status-right '#{?client_prefix,#[fg=colour232]#[bg=colour196] prefix mode ,}'
setw -g window-status-format '#[fg=colour235,bg=colour235,nobold,nounderscore,noitalics]#[fg=colour250,bg=colour235] #I  #W #[fg=colour235,bg=colour235,nobold,nounderscore,noitalics]'
setw -g window-status-current-format '#[fg=colour235,bg=colour238,nobold,nounderscore,noitalics]#[fg=colour222,bg=colour238] #I  #W  #[fg=colour238,bg=colour235,nobold,nounderscore,noitalics]'

bind -n C-k clear-history